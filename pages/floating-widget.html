<script>
  (function() {
    var widget = document.querySelector('.floating-widget');
    var trigger = widget.querySelector('.floating-widget-trigger');
    var panel = widget.querySelector('.floating-widget-panel');

    function setExpanded(isExpanded) {
      widget.classList.toggle('floating-widget-expanded', isExpanded);
      widget.classList.toggle('floating-widget-collapsed', !isExpanded);
      trigger.setAttribute('aria-expanded', String(isExpanded));
      panel.setAttribute('aria-hidden', String(!isExpanded));
    }

    trigger.addEventListener('click', function() {
      setExpanded(!widget.classList.contains('floating-widget-expanded'));
    });

    /* ORIGINAL FORM HANDLERS (preserved for future use)
    var cancel = widget.querySelector('.floating-widget-cancel');

    cancel.addEventListener('click', function() {
      setExpanded(false);
    });

    form.addEventListener('submit', function(event) {
      event.preventDefault();
      setExpanded(false);
    });
    END ORIGINAL FORM HANDLERS */
  })();
</script>
